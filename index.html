<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>언제만날까 🗓️</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0f; --surface: #18181c; --surface2: #222228; --border: #2e2e38;
      --accent: #c8f060; --accent2: #60f0c8; --text: #f0f0f0; --muted: #888; --danger: #f06060;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Gowun Dodum', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

    /* ── HEADER ── */
    header { width: 100%; padding: 50px 20px 35px; text-align: center; border-bottom: 1px solid var(--border); position: relative; }
    header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 120% at 50% -20%, rgba(200,240,96,.15) 0%, transparent 75%); pointer-events: none; }
    header h1 { font-family: 'Black Han Sans', sans-serif; font-size: 3rem; color: var(--accent); letter-spacing: -1px; }
    header p { margin-top: 10px; color: var(--muted); font-size: 1rem; }

    main { width: 100%; max-width: 800px; padding: 30px 20px 80px; display: flex; flex-direction: column; gap: 25px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; transition: transform 0.3s ease; }
    .card-title { font-family: 'Black Han Sans', sans-serif; font-size: 1.1rem; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

    /* ── SETUP ── */
    .setup-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .setup-row input { flex: 1; min-width: 200px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; color: var(--text); outline: none; font-size: 1rem; }
    .setup-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(200,240,96,0.1); }
    button { background: var(--accent); color: #000; border: none; border-radius: 12px; padding: 14px 24px; font-family: 'Black Han Sans', sans-serif; cursor: pointer; transition: 0.2s; white-space: nowrap; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    /* ── CALENDAR ── */
    .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .cal-month { font-family: 'Black Han Sans', sans-serif; font-size: 1.3rem; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .cal-dow { text-align: center; font-size: 0.75rem; color: var(--muted); padding-bottom: 10px; font-weight: bold; }
    .day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; border: 2px solid transparent; cursor: pointer; position: relative; background: var(--surface2); transition: 0.2s; }
    .day:hover { background: #2a2a32; }
    .day.past { opacity: 0.2; cursor: not-allowed; pointer-events: none; }
    .day.today { border-color: #444; }
    .day.today .day-num { color: var(--accent); font-weight: bold; }
    .day.mine { border-color: var(--accent) !important; box-shadow: 0 0 10px rgba(200,240,96,0.15); }
    
    /* Heatmap */
    .day.heat-1 { background: rgba(200,240,96,0.1); }
    .day.heat-2 { background: rgba(200,240,96,0.25); }
    .day.heat-3 { background: rgba(200,240,96,0.45); }
    .day.heat-4 { background: rgba(200,240,96,0.65); }
    .day.heat-5 { background: rgba(200,240,96,0.85); border-color: var(--accent); }
    .day.heat-5 .day-num { color: #000; font-weight: bold; }

    .day-dots { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; position: absolute; bottom: 6px; width: 100%; padding: 0 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); }

    /* ── POPUP TOOLTIP (핵심 수정 사항) ── */
    #tooltip {
      display: none; position: fixed; z-index: 10000;
      background: #25252d; border: 1px solid var(--border); border-radius: 18px;
      padding: 16px; width: 200px; box-shadow: 0 15px 50px rgba(0,0,0,0.8);
      flex-direction: column; gap: 12px;
      animation: popupScale 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popupScale { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    
    #tooltip::after { content: ""; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 10px solid #25252d; }
    .tt-header { font-family: 'Black Han Sans', sans-serif; color: var(--accent); font-size: 1rem; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .tt-list { max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin: 4px 0; }
    .tt-user { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; font-weight: 500; }
    .tt-dot { width: 10px; height: 10px; border-radius: 50%; }
    .tt-btn { width: 100%; padding: 12px; font-family: 'Black Han Sans', sans-serif; border-radius: 10px; border: none; cursor: pointer; transition: 0.2s; }

    /* ── OTHER UI ── */
    .member-chip { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 50px; padding: 8px 16px; font-size: 0.9rem; }
    .member-dot { width: 10px; height: 10px; border-radius: 50%; }
    .member-me { border: 1px solid var(--accent); color: var(--accent); }
    .best-item { display: flex; justify-content: space-between; align-items: center; background: var(--surface2); padding: 15px 20px; border-radius: 15px; border: 1px solid var(--border); }
    .best-count { font-family: 'Black Han Sans', sans-serif; color: var(--accent); font-size: 1.2rem; }
  </style>
</head>
<body>

<header>
  <h1>언제만날까 🗓️</h1>
  <p>최적의 모임 날짜를 찾는 가장 쉬운 방법</p>
</header>

<main>
  <div class="card" id="setup-card">
    <div class="card-title">🚀 시작하기</div>
    <div class="setup-row">
      <input id="name-input" type="text" placeholder="본인 이름 입력" maxlength="12"/>
      <input id="room-input" type="text" placeholder="방 제목 입력" maxlength="20"/>
      <button onclick="createRoom()">방 만들기</button>
      <button class="secondary" onclick="joinRoom()">참여하기</button>
    </div>
  </div>

  <div class="card" id="cal-card" style="display:none">
    <div class="cal-nav">
      <button class="secondary" onclick="changeMonth(-1)">이전 달</button>
      <span class="cal-month" id="cal-month-label"></span>
      <button class="secondary" onclick="changeMonth(1)">다음 달</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="card" id="members-card" style="display:none">
    <div class="card-title">👥 참여 중인 멤버</div>
    <div id="members-list" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
  </div>

  <div class="card" id="best-card" style="display:none">
    <div class="card-title">🏆 추천 날짜</div>
    <div id="best-list" style="display:flex; flex-direction:column; gap:12px;"></div>
  </div>
</main>

<div id="tooltip">
  <div class="tt-header" id="tt-date"></div>
  <div class="tt-list" id="tt-list"></div>
  <button id="tt-btn" class="tt-btn" onclick="handleToggle()"></button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhQWCcC806Cs0SKfxD9Ip4KWimZ0qhCIM",
  authDomain: "when-we-meet-efb40.firebaseapp.com",
  databaseURL: "https://when-we-meet-efb40-default-rtdb.firebaseio.com",
  projectId: "when-we-meet-efb40",
  storageBucket: "when-we-meet-efb40.firebasestorage.app",
  messagingSenderId: "863569184436",
  appId: "1:863569184436:web:0ffb85e7cfab2fce0779e1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myName='', roomId='', myColor='', viewYear, viewMonth, roomData={}, activeDate='';
const COLORS = ['#c8f060','#60f0c8','#f0c860','#f060a8','#60a8f0','#a860f0','#f09060','#60f090'];

// 방 생성
window.createRoom = async () => {
  const n = document.getElementById('name-input').value.trim();
  const rn = document.getElementById('room-input').value.trim() || '우리의 약속';
  if(!n) return alert('이름을 입력하세요!');
  roomId = Math.random().toString(36).slice(2,8).toUpperCase();
  myName = n; myColor = COLORS[0];
  await set(ref(db, `rooms/${roomId}`), { name: rn, members: { [n]: { color: myColor, dates: {} } } });
  startApp();
};

// 방 참여
window.joinRoom = async () => {
  const n = document.getElementById('name-input').value.trim();
  const urlParams = new URLSearchParams(location.search);
  roomId = urlParams.get('r') || roomId;
  if(!n || !roomId) return alert('이름과 방 정보가 필요합니다!');
  myName = n;
  const snap = await get(ref(db, `rooms/${roomId}`));
  if(!snap.exists()) return alert('방이 존재하지 않습니다.');
  const m = snap.val().members || {};
  if(!m[n]) {
    myColor = COLORS[Object.keys(m).length % COLORS.length];
    await update(ref(db, `rooms/${roomId}/members/${n}`), { color: myColor, dates: {} });
  } else { myColor = m[n].color; }
  startApp();
};

function startApp() {
  const d = new Date(); viewYear = d.getFullYear(); viewMonth = d.getMonth();
  document.getElementById('setup-card').style.display = 'none';
  ['cal-card','members-card','best-card'].forEach(id => document.getElementById(id).style.display = 'block');
  history.replaceState({}, '', '?r=' + roomId);
  onValue(ref(db, `rooms/${roomId}`), snap => {
    if(snap.exists()) { roomData = snap.val(); render(); }
  });
}

function render() {
  renderCalendar();
  renderMembers();
  renderBest();
  if(activeDate) updateTooltip();
}

function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${viewYear}년 ${viewMonth+1}월`;
  const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
  ['일','월','화','수','목','금','토'].forEach(d => grid.innerHTML += `<div class="cal-dow">${d}</div>`);
  
  const first = new Date(viewYear, viewMonth, 1).getDay();
  const last = new Date(viewYear, viewMonth+1, 0).getDate();
  const todayStr = new Date().toISOString().split('T')[0];

  for (let i = 0; i < first; i++) grid.innerHTML += `<div class="day empty" style="background:transparent; cursor:default;"></div>`;
  
  for (let d = 1; d <= last; d++) {
    const ds = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const who = Object.entries(roomData.members || {}).filter(([,m]) => m.dates?.[ds]);
    const isMine = !!roomData.members?.[myName]?.dates?.[ds];
    
    const dayEl = document.createElement('div');
    dayEl.className = `day ${ds < todayStr ? 'past' : ''} ${ds === todayStr ? 'today' : ''} ${isMine ? 'mine' : ''} heat-${Math.min(5, who.length)}`;
    dayEl.innerHTML = `<div class="day-num">${d}</div><div class="day-dots">${who.map(w=>`<div class="dot" style="background:${w[1].color}"></div>`).join('')}</div>`;
    
    dayEl.onclick = (e) => { e.stopPropagation(); openPopup(ds, dayEl); };
    grid.appendChild(dayEl);
  }
}

function openPopup(ds, el) {
  activeDate = ds;
  const tt = document.getElementById('tooltip');
  const rect = el.getBoundingClientRect();
  tt.style.display = 'flex';
  tt.style.top = `${rect.top + window.scrollY - tt.offsetHeight - 15}px`;
  tt.style.left = `${rect.left + window.scrollX + (rect.width/2) - (tt.offsetWidth/2)}px`;
  updateTooltip();
}

function updateTooltip() {
  const ds = activeDate;
  document.getElementById('tt-date').textContent = ds;
  const who = Object.entries(roomData.members || {}).filter(([,m]) => m.dates?.[ds]);
  document.getElementById('tt-list').innerHTML = who.length 
    ? who.map(([n,m]) => `<div class="tt-user"><div class="tt-dot" style="background:${m.color}"></div><span>${n}</span></div>`).join('')
    : `<div style="color:var(--muted); font-size:0.8rem; text-align:center;">선택한 사람 없음</div>`;
  
  const isMine = !!roomData.members[myName]?.dates?.[ds];
  const btn = document.getElementById('tt-btn');
  btn.textContent = isMine ? '참여 취소 ❌' : '나도 가능해요 ✅';
  btn.style.background = isMine ? 'var(--surface2)' : 'var(--accent)';
  btn.style.color = isMine ? 'var(--text)' : '#000';
  if(isMine) btn.style.border = '1px solid var(--border)';
}

window.handleToggle = async () => {
  const cur = !!roomData.members[myName]?.dates?.[activeDate];
  await update(ref(db, `rooms/${roomId}/members/${myName}/dates`), { [activeDate]: !cur });
};

function renderMembers() {
  document.getElementById('members-list').innerHTML = Object.entries(roomData.members || {}).map(([n,m]) => 
    `<div class="member-chip ${n===myName?'member-me':''}"><div class="member-dot" style="background:${m.color}"></div>${n}</div>`).join('');
}

function renderBest() {
  const counts = {};
  Object.values(roomData.members || {}).forEach(m => Object.keys(m.dates || {}).forEach(d => { if(m.dates[d]) counts[d] = (counts[d]||0)+1; }));
  const sorted = Object.entries(counts).filter(([,c])=>c>0).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('best-list').innerHTML = sorted.length
    ? sorted.map(([d,c]) => `<div class="best-item"><span>${d}</span><span class="best-count">${c}명 가능</span></div>`).join('')
    : '<div style="color:var(--muted); text-align:center;">날짜를 선택해 보세요!</div>';
}

window.changeMonth = (n) => { viewMonth += n; if(viewMonth>11){viewMonth=0;viewYear++;} else if(viewMonth<0){viewMonth=11;viewYear--;} closePopup(); render(); };
const closePopup = () => { document.getElementById('tooltip').style.display='none'; activeDate=''; };
document.addEventListener('click', (e) => { if(!e.target.closest('#tooltip') && !e.target.closest('.day')) closePopup(); });

// 초기 링크 자동 인식
window.onload = () => {
  const r = new URLSearchParams(location.search).get('r');
  if(r) { roomId = r; document.getElementById('room-input').style.display = 'none'; }
};
</script>
</body>
</html>
