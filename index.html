<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>언제만날까 🗓️</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #c8f060;
      --accent2: #60f0c8;
      --text: #f0f0f0;
      --muted: #888;
      --danger: #f06060;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Gowun Dodum', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      padding: 40px 20px 28px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 120% at 50% -20%, rgba(200,240,96,.12) 0%, transparent 70%);
      pointer-events: none;
    }
    header h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      letter-spacing: -1px;
      color: var(--accent);
      position: relative;
    }
    header p { margin-top: 6px; color: var(--muted); font-size: .95rem; position: relative; }
    main {
      width: 100%;
      max-width: 860px;
      padding: 28px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }
    .card-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.05rem;
      color: var(--accent);
      margin-bottom: 16px;
      letter-spacing: .5px;
    }
    .setup-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .setup-row input {
      flex: 1; min-width: 160px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: .95rem;
      outline: none;
    }
    button {
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 10px;
      padding: 11px 22px;
      font-family: 'Black Han Sans', sans-serif;
      font-size: .95rem;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    button.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .share-banner {
      display: none; align-items: center; gap: 10px; flex-wrap: wrap;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px;
    }
    .share-banner.visible { display: flex; }
    .share-url { flex: 1; font-size: .82rem; color: var(--accent2); word-break: break-all; }
    .copy-btn {
      background: var(--surface); color: var(--accent2); border: 1px solid var(--accent2);
      border-radius: 8px; padding: 7px 14px; font-size: .82rem; cursor: pointer;
    }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-month { font-family: 'Black Han Sans', sans-serif; font-size: 1.15rem; color: var(--text); }
    .cal-nav button { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 7px 14px; border-radius: 8px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; position: relative; }
    .cal-dow { text-align: center; font-size: .72rem; color: var(--muted); padding: 4px 0 8px; }
    .cal-dow:first-child { color: #f08080; }
    .cal-dow:last-child { color: #80a0f0; }
    .day {
      aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      border-radius: 10px; border: 1.5px solid transparent; cursor: pointer; position: relative;
      transition: background .15s, border-color .15s; font-size: .85rem; user-select: none; gap: 2px;
    }
    .day.past { opacity: 0.3; cursor: not-allowed; }
    .day.today .day-num { color: var(--accent); font-weight: bold; }
    .day.heat-1 { background: rgba(200,240,96,.12); }
    .day.heat-2 { background: rgba(200,240,96,.25); }
    .day.heat-3 { background: rgba(200,240,96,.40); }
    .day.heat-4 { background: rgba(200,240,96,.60); }
    .day.heat-5 { background: rgba(200,240,96,.80); border-color: var(--accent); }
    .day.mine { border-color: var(--accent) !important; }
    .day-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 36px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; }

    /* ── 툴팁(팝업) 스타일 추가 ── */
    #tooltip {
      display: none;
      position: fixed; /* 뷰포트 기준 */
      z-index: 1000;
      background: #1e1e26;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      flex-direction: column;
      gap: 8px;
      pointer-events: auto;
    }
    /* 툴팁 화살표 */
    #tooltip::after {
      content: "";
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid #1e1e26;
    }
    .tooltip-date { font-family: 'Black Han Sans', sans-serif; font-size: 0.9rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .tooltip-list { display: flex; flex-direction: column; gap: 4px; max-height: 100px; overflow-y: auto; }
    .tooltip-user { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
    .tooltip-dot { width: 7px; height: 7px; border-radius: 50%; }
    .tooltip-btn { width: 100%; padding: 6px; font-size: 0.75rem; border-radius: 6px; margin-top: 4px; }

    .members-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .member-chip { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: .85rem; }
    .member-dot { width: 9px; height: 9px; border-radius: 50%; }
    .member-me { border-color: var(--accent); color: var(--accent); }
    .best-list { display: flex; flex-direction: column; gap: 8px; }
    .best-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border-radius: 10px; padding: 10px 16px; font-size: .9rem; }
    .best-count { font-family: 'Black Han Sans', sans-serif; font-size: 1rem; color: var(--accent); }
    #status { text-align: center; font-size: .82rem; color: var(--muted); min-height: 20px; }
    @media (max-width: 480px) { .day { font-size: .72rem; } .cal-grid { gap: 3px; } }
  </style>
</head>
<body>

<header>
  <h1>언제만날까 🗓️</h1>
  <p>친구들과 가능한 날짜를 공유하고 최적의 날을 찾아봐요</p>
</header>

<main>
  <div class="card" id="setup-card">
    <div class="card-title">👤 이름 입력 & 방 만들기</div>
    <div class="setup-row">
      <input id="name-input" type="text" placeholder="내 이름 (예: 김철수)" maxlength="12"/>
      <input id="room-input" type="text" placeholder="방 이름 (새로 만들 때)" maxlength="20"/>
      <button onclick="createRoom()">방 만들기</button>
      <button class="secondary" onclick="joinRoom()">기존 방 참여</button>
    </div>
  </div>

  <div class="share-banner" id="share-banner">
    <span style="color:var(--muted);font-size:.82rem;white-space:nowrap">🔗 공유 링크</span>
    <span class="share-url" id="share-url"></span>
    <button class="copy-btn" onclick="copyLink()">복사</button>
  </div>

  <div class="card" id="cal-card" style="display:none">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">◀</button>
      <span class="cal-month" id="cal-month-label"></span>
      <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="cal-grid" id="cal-grid">
      <div id="tooltip">
        <div class="tooltip-date" id="tooltip-date"></div>
        <div class="tooltip-list" id="tooltip-list"></div>
        <button id="tooltip-btn" class="tooltip-btn" onclick="handleToggleClick()"></button>
      </div>
    </div>
    <p style="margin-top:14px;font-size:.78rem;color:var(--muted)">날짜를 클릭해 누가 가능한지 확인하고 선택하세요!</p>
  </div>

  <div class="card" id="members-card" style="display:none">
    <div class="card-title">👥 참여중인 친구들</div>
    <div class="members-list" id="members-list"></div>
  </div>

  <div class="card" id="best-card" style="display:none">
    <div class="card-title">🏆 모두가 가능한 날 TOP 5</div>
    <div class="best-list" id="best-list"></div>
  </div>

  <div id="status"></div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhQWCcC806Cs0SKfxD9Ip4KWimZ0qhCIM",
  authDomain: "when-we-meet-efb40.firebaseapp.com",
  databaseURL: "https://when-we-meet-efb40-default-rtdb.firebaseio.com",
  projectId: "when-we-meet-efb40",
  storageBucket: "when-we-meet-efb40.firebasestorage.app",
  messagingSenderId: "863569184436",
  appId: "1:863569184436:web:0ffb85e7cfab2fce0779e1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myName = '';
let roomId = '';
let myColor = '';
let viewYear, viewMonth;
let roomData = {};
let selectedDateForTooltip = null; // 현재 툴팁이 가리키는 날짜

const COLORS = ['#c8f060','#60f0c8','#f0c860','#f060a8','#60a8f0','#a860f0','#f09060','#60f090'];

window.createRoom = async function() {
  try {
    const name = document.getElementById('name-input').value.trim();
    const rname = document.getElementById('room-input').value.trim() || '우리의 약속';
    if (!name) { alert('이름을 입력해주세요!'); return; }
    status('방 만드는 중...');
    const nameKey = rname.replace(/[.#$[\]]/g, '_');
    const nameIndexRef = ref(db, `roomNames/${nameKey}`);
    const nameSnap = await get(nameIndexRef);
    if (nameSnap.exists()) { alert(`방이 이미 존재해요!`); status(''); return; }
    myName = name; roomId = Math.random().toString(36).slice(2,8).toUpperCase(); myColor = COLORS[0];
    await set(nameIndexRef, roomId);
    await set(ref(db, `rooms/${roomId}`), { name: rname, createdAt: Date.now(), members: { [myName]: { color: myColor, dates: {} } } });
    initRoom();
  } catch(e) { alert('오류 발생: ' + e.message); status(''); }
};

window.joinRoom = async function() {
  const name = document.getElementById('name-input').value.trim();
  const rname = document.getElementById('room-input').value.trim();
  if (!name) { alert('이름을 입력해주세요!'); return; }
  const urlRoom = new URLSearchParams(location.search).get('r');
  if (urlRoom) { roomId = urlRoom; } 
  else if (rname) {
    const nameKey = rname.replace(/[.#$[\]]/g, '_');
    const nameSnap = await get(ref(db, `roomNames/${nameKey}`));
    if (!nameSnap.exists()) { alert(`방을 찾을 수 없어요.`); return; }
    roomId = nameSnap.val();
  } else { alert('방 이름을 입력하거나 링크로 접속하세요!'); return; }
  myName = name;
  const snap = await get(ref(db, `rooms/${roomId}`));
  if (!snap.exists()) return;
  const members = snap.val().members || {};
  if (members[myName]) { myColor = members[myName].color; } 
  else {
    const usedColors = Object.values(members).map(m => m.color);
    myColor = COLORS.find(c => !usedColors.includes(c)) || COLORS[Object.keys(members).length % COLORS.length];
    await update(ref(db, `rooms/${roomId}/members/${myName}`), { color: myColor, dates: {} });
  }
  initRoom();
};

function initRoom() {
  const d = new Date(); viewYear = d.getFullYear(); viewMonth = d.getMonth();
  document.getElementById('setup-card').style.display = 'none';
  document.getElementById('cal-card').style.display = 'block';
  document.getElementById('members-card').style.display = 'block';
  document.getElementById('best-card').style.display = 'block';
  document.getElementById('share-url').textContent = `${location.origin}${location.pathname}?r=${roomId}`;
  document.getElementById('share-banner').classList.add('visible');
  history.replaceState({}, '', `?r=${roomId}`);
  onValue(ref(db, `rooms/${roomId}`), snap => {
    if (!snap.exists()) return;
    roomData = snap.val();
    renderCalendar(); renderMembers(); renderBest();
    if(selectedDateForTooltip) updateTooltip(selectedDateForTooltip); // 데이터 갱신 시 툴팁도 갱신
  });
  status('실시간 연결됨 ✅');
}

window.changeMonth = function(delta) {
  viewMonth += delta;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  hideTooltip();
  renderCalendar();
};

function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${viewYear}년 ${viewMonth+1}월`;
  const grid = document.getElementById('cal-grid');
  // 툴팁 제외하고 비우기
  const tooltip = document.getElementById('tooltip');
  grid.innerHTML = '';
  grid.appendChild(tooltip);

  ['일','월','화','수','목','금','토'].forEach(d => {
    const el = document.createElement('div'); el.className = 'cal-dow'; el.textContent = d; grid.appendChild(el);
  });

  const first = new Date(viewYear, viewMonth, 1).getDay();
  const total = new Date(viewYear, viewMonth+1, 0).getDate();
  const members = roomData.members || {};
  
  const countMap = {}; const whoMap = {};
  Object.entries(members).forEach(([name, m]) => {
    Object.keys(m.dates || {}).forEach(dk => {
      if (m.dates[dk]) {
        countMap[dk] = (countMap[dk] || 0) + 1;
        if (!whoMap[dk]) whoMap[dk] = [];
        whoMap[dk].push({ name, color: m.color });
      }
    });
  });
  const maxCount = Math.max(1, ...Object.values(countMap));

  for (let i = 0; i < first; i++) grid.appendChild(document.createElement('div')).className = 'day empty';

  for (let d = 1; d <= total; d++) {
    const ds = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isPast = ds < today();
    const isMine = !!(members[myName]?.dates?.[ds]);
    const count = countMap[ds] || 0;
    const heat = count === 0 ? 0 : Math.ceil((count / maxCount) * 5);

    const el = document.createElement('div');
    el.className = `day ${isPast?'past':''} ${ds===today()?'today':''} ${isMine?'mine':''} ${heat?`heat-${heat}`:''}`;
    el.innerHTML = `<div class="day-num">${d}</div>`;
    
    if (count > 0) {
      const dots = document.createElement('div'); dots.className = 'day-dots';
      whoMap[ds].forEach(w => {
        const dot = document.createElement('div'); dot.className = 'dot'; dot.style.background = w.color; dots.appendChild(dot);
      });
      el.appendChild(dots);
    }

    if (!isPast) {
      el.onclick = (e) => {
        e.stopPropagation();
        showTooltip(ds, el);
      };
    }
    grid.appendChild(el);
  }
}

// ── 툴팁 관련 함수 ──
function showTooltip(dateStr, targetEl) {
  selectedDateForTooltip = dateStr;
  const tooltip = document.getElementById('tooltip');
  
  // 위치 계산
  const rect = targetEl.getBoundingClientRect();
  tooltip.style.display = 'flex';
  tooltip.style.left = `${rect.left + window.scrollX + rect.width/2 - 80}px`;
  tooltip.style.top = `${rect.top + window.scrollY - tooltip.offsetHeight - 10}px`;

  updateTooltip(dateStr);
}

function updateTooltip(dateStr) {
  const members = roomData.members || {};
  const dsParts = dateStr.split('-');
  document.getElementById('tooltip-date').textContent = `${dsParts[1]}월 ${dsParts[2]}일`;

  const listEl = document.getElementById('tooltip-list');
  listEl.innerHTML = '';
  
  const whoList = Object.entries(members).filter(([, m]) => m.dates?.[dateStr]);
  if (whoList.length === 0) {
    listEl.innerHTML = '<div style="font-size:0.7rem;color:var(--muted)">가능한 친구 없음</div>';
  } else {
    whoList
