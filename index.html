<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>언제만날까 🗓️</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #c8f060;
      --accent2: #60f0c8;
      --text: #f0f0f0;
      --muted: #888;
      --danger: #f06060;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Gowun Dodum', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      padding: 40px 20px 28px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 120% at 50% -20%, rgba(200,240,96,.12) 0%, transparent 70%);
      pointer-events: none;
    }
    header h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      letter-spacing: -1px;
      color: var(--accent);
      position: relative;
    }
    header p { margin-top: 6px; color: var(--muted); font-size: .95rem; position: relative; }
    main {
      width: 100%;
      max-width: 860px;
      padding: 28px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }
    .card-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.05rem;
      color: var(--accent);
      margin-bottom: 16px;
      letter-spacing: .5px;
    }
    .setup-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .setup-row input {
      flex: 1; min-width: 160px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      color: var(--text);
