<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>언제만날까 🗓️</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0f; --surface: #18181c; --surface2: #222228; --border: #2e2e38;
      --accent: #c8f060; --accent2: #60f0c8; --text: #f0f0f0; --muted: #888; --danger: #f06060;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Gowun Dodum', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

    /* ── 원본 헤더 디자인 유지 ── */
    header { width: 100%; padding: 40px 20px 28px; text-align: center; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
    header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 120% at 50% -20%, rgba(200,240,96,.12) 0%, transparent 70%); pointer-events: none; }
    header h1 { font-family: 'Black Han Sans', sans-serif; font-size: clamp(2rem, 6vw, 3.2rem); color: var(--accent); position: relative; }
    header p { margin-top: 6px; color: var(--muted); font-size: .95rem; position: relative; }

    main { width: 100%; max-width: 860px; padding: 28px 20px 60px; display: flex; flex-direction: column; gap: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
    .card-title { font-family: 'Black Han Sans', sans-serif; color: var(--accent); margin-bottom: 16px; }

    .setup-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .setup-row input { flex: 1; min-width: 160px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px; color: var(--text); outline: none; }
    
    button { background: var(--accent); color: #0d0d0f; border: none; border-radius: 10px; padding: 11px 22px; font-family: 'Black Han Sans', sans-serif; cursor: pointer; transition: 0.15s; }
    button.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    .share-banner { display: none; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; }
    .share-banner.visible { display: flex; }
    .share-url { flex: 1; font-size: .82rem; color: var(--accent2); word-break: break-all; }

    .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .cal-dow { text-align: center; font-size: .72rem; color: var(--muted); padding: 4px 0 8px; }
    
    .day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; border: 1.5px solid transparent; cursor: pointer; font-size: .85rem; transition: 0.15s; gap: 2px; }
    .day.past { opacity: .3; cursor: not-allowed; }
    .day.today .day-num { color: var(--accent); font-weight: bold; }
    .day.mine { border-color: var(--accent) !important; }
    .day.heat-1 { background: rgba(200,240,96,.12); }
    .day.heat-2 { background: rgba(200,240,96,.25); }
    .day.heat-3 { background: rgba(200,240,96,.40); }
    .day.heat-4 { background: rgba(200,240,96,.60); }
    .day.heat-5 { background: rgba(200,240,96,.80); border-color: var(--accent); }
    .day-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 36px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; }

    /* ── 팝업형 툴팁 (최상위 고정) ── */
    #tooltip {
      display: none; position: fixed; z-index: 9999;
      background: #1e1e26; border: 1px solid var(--border); border-radius: 12px;
      padding: 12px; width: 170px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      flex-direction: column; gap: 8px; pointer-events: auto;
    }
    #tooltip::after { content: ""; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 8px solid #1e1e26; }
    .tooltip-date { font-family: 'Black Han Sans', sans-serif; font-size: 0.9rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .tooltip-list { max-height: 80px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .tooltip-user { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
    .tooltip-dot { width: 7px; height: 7px; border-radius: 50%; }
    .tooltip-btn { width: 100%; padding: 8px; font-size: 0.75rem; border-radius: 8px; margin-top: 4px; }

    .members-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .member-chip { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: .85rem; }
    .member-dot { width: 9px; height: 9px; border-radius: 50%; }
    .member-me { border-color: var(--accent); color: var(--accent); }
    
    .best-list { display: flex; flex-direction: column; gap: 8px; }
    .best-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border-radius: 10px; padding: 10px 16px; font-size: .9rem; }
    .best-count { font-family: 'Black Han Sans', sans-serif; color: var(--accent); }
    #status { text-align: center; font-size: .82rem; color: var(--muted); min-height: 20px; margin-bottom: 20px; }
  </style>
</head>
<body>

<header>
  <h1>언제만날까 🗓️</h1>
  <p>친구들과 가능한 날짜를 공유하고 최적의 날을 찾아봐요</p>
</header>

<main>
  <div class="card" id="setup-card">
    <div class="card-title">👤 이름 입력 & 방 만들기</div>
    <div class="setup-row">
      <input id="name-input" type="text" placeholder="내 이름" maxlength="12"/>
      <input id="room-input" type="text" placeholder="방 이름 (새로 만들 때)" maxlength="20"/>
      <button onclick="createRoom()">방 만들기</button>
      <button class="secondary" onclick="joinRoom()">기존 방 참여</button>
    </div>
  </div>

  <div class="share-banner" id="share-banner">
    <span class="share-url" id="share-url"></span>
    <button onclick="copyLink()">복사</button>
  </div>

  <div class="card" id="cal-card" style="display:none">
    <div class="cal-nav">
      <button class="secondary" onclick="changeMonth(-1)">◀</button>
      <span class="cal-month" id="cal-month-label"></span>
      <button class="secondary" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="card" id="members-card" style="display:none">
    <div class="card-title">👥 참여중인 친구들</div>
    <div class="members-list" id="members-list"></div>
  </div>

  <div class="card" id="best-card" style="display:none">
    <div class="card-title">🏆 모두가 가능한 날 TOP 5</div>
    <div class="best-list" id="best-list"></div>
  </div>
  <div id="status"></div>
</main>

<div id="tooltip">
  <div class="tooltip-date" id="tooltip-date"></div>
  <div class="tooltip-list" id="tooltip-list"></div>
  <button id="tooltip-btn" class="tooltip-btn" onclick="toggleSelectedDate()"></button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhQWCcC806Cs0SKfxD9Ip4KWimZ0qhCIM",
  authDomain: "when-we-meet-efb40.firebaseapp.com",
  databaseURL: "https://when-we-meet-efb40-default-rtdb.firebaseio.com",
  projectId: "when-we-meet-efb40",
  storageBucket: "when-we-meet-efb40.firebasestorage.app",
  messagingSenderId: "863569184436",
  appId: "1:863569184436:web:0ffb85e7cfab2fce0779e1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myName='', roomId='', myColor='', viewYear, viewMonth, roomData={}, activeDate='';
const COLORS = ['#c8f060','#60f0c8','#f0c860','#f060a8','#60a8f0','#a860f0','#f09060','#60f090'];

window.createRoom = async function() {
  const name = document.getElementById('name-input').value.trim();
  const rname = document.getElementById('room-input').value.trim() || '우리의 약속';
  if (!name) return alert('이름 필수!');
  roomId = Math.random().toString(36).slice(2,8).toUpperCase();
  myName = name; myColor = COLORS[0];
  await set(ref(db, `roomNames/${rname.replace(/[.#$[\]]/g, '_')}`), roomId);
  await set(ref(db, `rooms/${roomId}`), { name: rname, members: { [name]: { color: myColor, dates: {} } } });
  initRoom();
};

window.joinRoom = async function() {
  const name = document.getElementById('name-input').value.trim();
  const urlRoom = new URLSearchParams(location.search).get('r');
  if (!name) return alert('이름 입력!');
  roomId = urlRoom || roomId; 
  if(!roomId) return alert('방 이름을 입력하거나 링크로 오세요!');
  myName = name;
  const snap = await get(ref(db, `rooms/${roomId}`));
  if(!snap.exists()) return alert('방 없음');
  const members = snap.val().members || {};
  if(!members[name]) {
    myColor = COLORS[Object.keys(members).length % COLORS.length];
    await update(ref(db, `rooms/${roomId}/members/${name}`), { color: myColor, dates: {} });
  } else { myColor = members[name].color; }
  initRoom();
};

function initRoom() {
  const d = new Date(); viewYear = d.getFullYear(); viewMonth = d.getMonth();
  document.getElementById('setup-card').style.display = 'none';
  ['cal-card','members-card','best-card'].forEach(id => document.getElementById(id).style.display = 'block');
  document.getElementById('share-url').textContent = location.origin + location.pathname + '?r=' + roomId;
  document.getElementById('share-banner').classList.add('visible');
  history.replaceState({}, '', `?r=${roomId}`);
  onValue(ref(db, `rooms/${roomId}`), snap => {
    if(snap.exists()) { roomData = snap.val(); renderCalendar(); renderMembers(); renderBest(); if(activeDate) updateTooltip(); }
  });
}

function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${viewYear}년 ${viewMonth+1}월`;
  const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
  ['일','월','화','수','목','금','토'].forEach(d => {
    const el = document.createElement('div'); el.className = 'cal-dow'; el.textContent = d; grid.appendChild(el);
  });
  const first = new Date(viewYear, viewMonth, 1).getDay();
  const total = new Date(viewYear, viewMonth+1, 0).getDate();
  for (let i = 0; i < first; i++) grid.appendChild(document.createElement('div')).className = 'day empty';
  for (let d = 1; d <= total; d++) {
    const ds = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const who = Object.entries(roomData.members || {}).filter(([,m]) => m.dates?.[ds]).map(([n,m]) => m.color);
    const el = document.createElement('div');
    el.className = `day ${ds<today()?'past':''} ${ds===today()?'today':''} ${roomData.members?.[myName]?.dates?.[ds]?'mine':''} ${who.length?`heat-${Math.min(5, who.length)}`:''}`;
    el.innerHTML = `<div class="day-num">${d}</div><div class="day-dots">${who.map(c=>`<div class="dot" style="background:${c}"></div>`).join('')}</div>`;
    if(ds >= today()) el.onclick = (e) => { e.stopPropagation(); openTooltip(ds, el); };
    grid.appendChild(el);
  }
}

function openTooltip(ds, el) {
  activeDate = ds;
  const tt = document.getElementById('tooltip');
  const rect = el.getBoundingClientRect();
  tt.style.display = 'flex';
  tt.style.top = `${rect.top + window.scrollY - tt.offsetHeight - 12}px`;
  tt.style.left = `${rect.left + window.scrollX + rect.width/2 - tt.offsetWidth/2}px`;
  updateTooltip();
}

function updateTooltip() {
  const ds = activeDate;
  document.getElementById('tooltip-date').textContent = ds;
  const who = Object.entries(roomData.members || {}).filter(([,m]) => m.dates?.[ds]);
  document.getElementById('tooltip-list').innerHTML = who.length 
    ? who.map(([n,m]) => `<div class="tooltip-user"><div class="tooltip-dot" style="background:${m.color}"></div>${n}</div>`).join('')
    : '<div style="font-size:0.7rem;color:#888">가능한 사람 없음</div>';
  const isMine = !!roomData.members?.[myName]?.dates?.[ds];
  const btn = document.getElementById('tooltip-btn');
  btn.textContent = isMine ? '나도 안돼요 ❌' : '나도 가능해요 ✅';
  btn.style.background = isMine ? 'var(--surface2)' : 'var(--accent)';
  btn.style.color = isMine ? 'var(--text)' : '#000';
}

window.toggleSelectedDate = async function() {
  const current = !!roomData.members[myName]?.dates?.[activeDate];
  await update(ref(db, `rooms/${roomId}/members/${myName}/dates`), { [activeDate]: !current });
};

function renderMembers() {
  document.getElementById('members-list').innerHTML = Object.entries(roomData.members || {}).map(([n,m]) => 
    `<div class="member-chip ${n===myName?'member-me':''}"><div class="member-dot" style="background:${m.color}"></div>${n}</div>`).join('');
}

function renderBest() {
  const counts = {};
  Object.values(roomData.members || {}).forEach(m => Object.keys(m.dates || {}).forEach(d => { if(m.dates[d]) counts[d]=(counts[d]||0)+1; }));
  const sorted = Object.entries(counts).filter(([,c])=>c>0).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('best-list').innerHTML = sorted.length 
    ? sorted.map(([d,c]) => `<div class="best-item"><span>${d}</span><span class="best-count">${c}명 가능</span></div>`).join('')
    : '<p style="color:var(--muted);font-size:.85rem">선택된 날짜 없음</p>';
}

window.changeMonth = (n) => { viewMonth += n; if(viewMonth>11){viewMonth=0;viewYear++;} else if(viewMonth<0){viewMonth=11;viewYear--;} closeTooltip(); renderCalendar(); };
const closeTooltip = () => { document.getElementById('tooltip').style.display='none'; activeDate=''; };
document.addEventListener('click', (e) => { if(!e.target.closest('#tooltip')) closeTooltip(); });
window.copyLink = () => { navigator.clipboard.writeText(document.getElementById('share-url').textContent).then(()=>alert('복사완료!')); };
function today() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
</script>
</body>
</html>
